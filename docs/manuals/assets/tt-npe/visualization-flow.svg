<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">TT-NPE NoC visualization flow</title>
  <desc id="desc">A workflow diagram showing how raw NoC traces move through TT-NPE into visualization JSON for the visualizer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#effaf6"/>
      <stop offset="100%" stop-color="#eef2ea"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f766e"/>
    </marker>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f766e; }
      .body { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .code { font: 400 17px Consolas, 'DejaVu Sans Mono', monospace; fill: #e2e8f0; }
      .mono-dark { font: 400 17px Consolas, 'DejaVu Sans Mono', monospace; fill: #0f172a; }
    </style>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)"/>
  <text x="70" y="80" class="title">How to visualize NoC activity with TT-NPE</text>
  <text x="70" y="118" class="subtitle">Profiler traces go into TT-NPE analysis, which writes visualizer JSON into an <tspan font-family="Consolas, monospace">npe_viz/</tspan> folder.</text>
  <rect x="70" y="220" rx="28" ry="28" width="360" height="350" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="100" y="275" class="box-title">Step 1. Capture traces</text>
  <text x="100" y="315" class="body">Collect raw NoC events with the profiler.</text>
  <rect x="100" y="350" rx="16" ry="16" width="300" height="160" fill="#0f172a"/>
  <text x="120" y="390" class="code">profile_this.py</text>
  <text x="120" y="420" class="code">--collect-noc-traces</text>
  <text x="120" y="450" class="code">-c 'pytest command/to/trace.py'</text>
  <text x="120" y="480" class="code">-o output_dir</text>
  <text x="100" y="540" class="body">Raw traces appear under</text>
  <text x="100" y="567" class="body"><tspan font-family="Consolas, monospace">output_dir/.logs/</tspan></text>
  <rect x="520" y="220" rx="28" ry="28" width="360" height="350" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="550" y="275" class="box-title">Step 2. Analyze with TT-NPE</text>
  <text x="550" y="315" class="body">Generate timeline data from the trace directory.</text>
  <rect x="550" y="350" rx="16" ry="16" width="300" height="160" fill="#0f172a"/>
  <text x="570" y="395" class="code">npe_analyze_noc_trace_dir.py</text>
  <text x="570" y="425" class="code">output_dir/.logs/ -e</text>
  <text x="550" y="540" class="body">This produces visualizer JSON inputs.</text>
  <rect x="970" y="220" rx="28" ry="28" width="360" height="350" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1000" y="275" class="box-title">Step 3. Open in visualizer</text>
  <text x="1000" y="315" class="body">Load the generated JSON in the visualizer's</text>
  <text x="1000" y="342" class="body">NPE mode.</text>
  <rect x="1000" y="350" rx="16" ry="16" width="300" height="160" fill="#ecfeff" stroke="#99f6e4"/>
  <text x="1020" y="392" class="mono-dark">output_dir/</text>
  <text x="1020" y="420" class="mono-dark">  npe_viz/</text>
  <text x="1020" y="448" class="mono-dark">    *.json</text>
  <text x="1000" y="540" class="body">These files are the handoff point for the</text>
  <text x="1000" y="567" class="body">visual workflow.</text>
  <line x1="430" y1="395" x2="520" y2="395" stroke="#0f766e" stroke-width="8" marker-end="url(#arrow)"/>
  <line x1="880" y1="395" x2="970" y2="395" stroke="#0f766e" stroke-width="8" marker-end="url(#arrow)"/>
  <rect x="70" y="650" rx="24" ry="24" width="1260" height="130" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="100" y="705" class="box-title">Fast local alternative</text>
  <text x="100" y="742" class="body">If you are only simulating a workload JSON, run <tspan font-family="Consolas, monospace">tt_npe.py -w ... -e</tspan> first. That creates <tspan font-family="Consolas, monospace">npe_timeline.json</tspan> for direct inspection before you move to trace-based visualization.</text>
</svg>
