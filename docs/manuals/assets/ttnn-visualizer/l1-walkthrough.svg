<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">L1 buffer walkthrough</title>
  <desc id="desc">A TT-NN Visualizer walkthrough showing reports, operations, memory details, tensors, buffers, and graph views.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#effaf6"/>
      <stop offset="100%" stop-color="#eef2ea"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f766e"/>
    </marker>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 23px 'Segoe UI', Arial, sans-serif; fill: #0f766e; }
      .body { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .mono { font: 400 17px Consolas, 'DejaVu Sans Mono', monospace; fill: #0f172a; }
    </style>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)"/>
  <text x="70" y="80" class="title">Practical L1 buffer workflow</text>
  <text x="70" y="118" class="subtitle">This follows the BOS intro: load a report, open Operations, then drill into Memory Details for each op.</text>

  <rect x="70" y="200" rx="26" ry="26" width="240" height="260" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="95" y="250" class="box-title">1. Reports</text>
  <text x="95" y="292" class="body">Load a memory report</text>
  <text x="95" y="320" class="body">directory first.</text>

  <rect x="390" y="200" rx="26" ry="26" width="240" height="260" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="415" y="250" class="box-title">2. Operations</text>
  <text x="415" y="292" class="body">Filter ops, select one,</text>
  <text x="415" y="320" class="body">then click</text>
  <text x="415" y="348" class="mono">Memory Details</text>

  <rect x="710" y="200" rx="26" ry="26" width="240" height="260" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="735" y="250" class="box-title">3. Memory Details</text>
  <text x="735" y="292" class="body">Inspect per-core L1</text>
  <text x="735" y="320" class="body">placement, buffers,</text>
  <text x="735" y="348" class="body">and reuse patterns.</text>

  <rect x="1030" y="200" rx="26" ry="26" width="290" height="260" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1055" y="250" class="box-title">4. Cross-check tabs</text>
  <text x="1055" y="292" class="body">Use Tensors, Buffers,</text>
  <text x="1055" y="320" class="body">Graphs, and Performance</text>
  <text x="1055" y="348" class="body">for wider context.</text>

  <line x1="310" y1="330" x2="390" y2="330" stroke="#0f766e" stroke-width="8" marker-end="url(#arrow)"/>
  <line x1="630" y1="330" x2="710" y2="330" stroke="#0f766e" stroke-width="8" marker-end="url(#arrow)"/>
  <line x1="950" y1="330" x2="1030" y2="330" stroke="#0f766e" stroke-width="8" marker-end="url(#arrow)"/>

  <rect x="70" y="545" rx="28" ry="28" width="1250" height="215" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="100" y="600" class="box-title">What you learn from this workflow</text>
  <text x="100" y="645" class="body">Operations view: where to start and how to find the exact op.</text>
  <text x="100" y="680" class="body">Memory Details: the main L1 drill-down screen for per-operation inspection.</text>
  <text x="100" y="715" class="body">Buffers/Tensors/Graph: broader context for allocation behavior, layout, and model structure.</text>
</svg>
